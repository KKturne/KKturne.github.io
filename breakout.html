<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🕹️ Breakout — KKTurne 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050a10;
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    touch-action: none;
  }

  /* TOPPLINJE */
  .topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    flex-shrink: 0;
    background: #050a10;
    border-bottom: 1px solid #111;
  }
  .back-btn {
    background: #111;
    border: 1px solid #222;
    color: #aaa;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .back-btn:active { opacity: .7; }
  .title { font-size: 14px; font-weight: 800; color: #fff; }
  .score-display { font-size: 14px; font-weight: 800; color: #f5c518; }

  /* CANVAS */
  #game-canvas {
    display: block;
    touch-action: none;
    flex-shrink: 0;
  }

  /* OVERLAY (game over / start) */
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,.85);
    gap: 16px;
    z-index: 10;
  }
  #overlay.hidden { display: none; }
  .overlay-title { font-size: 32px; font-weight: 900; text-align: center; }
  .overlay-sub { font-size: 16px; color: #aaa; text-align: center; }
  .play-btn {
    background: #f5c518;
    color: #000;
    border: none;
    border-radius: 14px;
    padding: 14px 36px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
    margin-top: 8px;
  }
  .play-btn:active { transform: scale(.95); }

  /* HIGHSCORE */
  #highscore-wrap {
    width: 100%;
    max-width: 400px;
    padding: 12px 16px;
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .hs-tittel {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #333;
    margin-bottom: 8px;
    text-align: center;
  }
  .hs-rad {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: #0d0d0d;
    border-radius: 10px;
    margin-bottom: 4px;
  }
  .hs-plass { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; }
  .hs-navn { flex: 1; color: #ccc; font-size: 13px; }
  .hs-poeng { font-weight: 800; color: #f5c518; font-size: 13px; }
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="history.back()">← Tilbake</button>
  <div class="title">🕹️ Breakout</div>
  <div class="score-display">Poeng: <span id="score">0</span></div>
</div>

<canvas id="game-canvas"></canvas>

<div id="highscore-wrap">
  <div class="hs-tittel">🏆 Toppliste</div>
  <div id="hs-liste"><div style="color:#222;text-align:center;padding:8px;font-size:13px">Laster…</div></div>
</div>

<div id="overlay">
  <div class="overlay-title" id="overlay-title">🕹️ Breakout</div>
  <div class="overlay-sub" id="overlay-sub">Bruk fingeren eller musen til å styre paddelen</div>
  <button class="play-btn" onclick="startSpill()">Start spillet</button>
</div>

<script>
const JB_URL = "https://api.jsonbin.io/v3/b/6a36672af5f4af5e2913c2f1";
const JB_KEY = "$2a$10$On.B9FR9GJ81fyDwAKsbzuL81xI6InKhu8d008hvY4DVgSEhCbYTa";

// Hent spillernavn fra localStorage (satt av hovedappen)
const SPILLERNAVN = localStorage.getItem("kn_bruker_navn") || "Anonym";

// ── CANVAS SETUP ──
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  const topbar = document.querySelector(".topbar");
  const hs = document.getElementById("highscore-wrap");
  const topH = topbar.offsetHeight;
  const hsH = Math.min(window.innerHeight * 0.22, 160);
  hs.style.height = hsH + "px";
  canvas.width = Math.min(window.innerWidth, 480);
  canvas.height = window.innerHeight - topH - hsH;
}
resizeCanvas();
window.addEventListener("resize", ()=>{ resizeCanvas(); if(!kjorer) tegn(); });

// ── SPILLVARIABLER ──
const FARGER = ["#ef4444","#f97316","#eab308","#22c55e","#3b82f6","#8b5cf6","#ec4899","#14b8a6"];
let ball, paddle, bricks, poeng, liv, kjorer, animId;

function startSpill(){
  document.getElementById("overlay").classList.add("hidden");
  poeng = 0;
  liv = 3;
  document.getElementById("score").textContent = "0";

  const W = canvas.width, H = canvas.height;
  const pW = Math.floor(W * 0.22);
  const bR = Math.max(6, Math.floor(W * 0.02));
  const fart = Math.max(3, W * 0.007);

  paddle = { x: W/2 - pW/2, y: H - 18, w: pW, h: 10 };
  ball = { x: W/2, y: H/2, r: bR, dx: fart * (Math.random() > .5 ? 1 : -1), dy: -fart };

  // Murstein
  const cols = 8, rows = 5;
  const bW = Math.floor((W - 24) / cols) - 4;
  const bH = Math.max(14, Math.floor(H * 0.055));
  bricks = [];
  for(let r = 0; r < rows; r++){
    for(let c = 0; c < cols; c++){
      bricks.push({
        x: 12 + c * (bW + 4),
        y: 44 + r * (bH + 5),
        w: bW, h: bH,
        farge: FARGER[r % FARGER.length],
        aktiv: true
      });
    }
  }

  kjorer = true;
  if(animId) cancelAnimationFrame(animId);
  loop();
}

function loop(){
  if(!kjorer) return;
  tegn();
  oppdater();
  animId = requestAnimationFrame(loop);
}

function tegn(){
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = "#050a10";
  ctx.fillRect(0, 0, W, H);

  // Murstein
  bricks.forEach(b => {
    if(!b.aktiv) return;
    ctx.fillStyle = b.farge;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,.18)";
    ctx.fillRect(b.x+3, b.y+3, b.w-6, 3);
  });

  // Paddle
  const grad = ctx.createLinearGradient(paddle.x, 0, paddle.x + paddle.w, 0);
  grad.addColorStop(0, "#f5c518");
  grad.addColorStop(1, "#e0a800");
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 5);
  ctx.fill();

  // Ball med glow
  ctx.shadowColor = "#fff";
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();
  ctx.shadowBlur = 0;

  // Liv
  ctx.font = `${Math.max(14, Math.floor(H * 0.032))}px serif`;
  for(let i = 0; i < liv; i++) ctx.fillText("❤️", 10 + i * 24, 28);
}

function oppdater(){
  const W = canvas.width, H = canvas.height;

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Vegger
  if(ball.x - ball.r < 0){ ball.x = ball.r; ball.dx = Math.abs(ball.dx); }
  if(ball.x + ball.r > W){ ball.x = W - ball.r; ball.dx = -Math.abs(ball.dx); }
  if(ball.y - ball.r < 0){ ball.y = ball.r; ball.dy = Math.abs(ball.dy); }

  // Paddle-kollisjon
  if(ball.y + ball.r >= paddle.y &&
     ball.y + ball.r <= paddle.y + paddle.h + Math.abs(ball.dy) + 2 &&
     ball.x >= paddle.x - ball.r && ball.x <= paddle.x + paddle.w + ball.r){
    const hit = (ball.x - paddle.x) / paddle.w; // 0–1
    const vinkel = (hit - 0.5) * Math.PI * 0.65;
    const fart = Math.sqrt(ball.dx**2 + ball.dy**2);
    ball.dx = fart * Math.sin(vinkel);
    ball.dy = -Math.abs(fart * Math.cos(vinkel));
    ball.y = paddle.y - ball.r - 1;
  }

  // Murstein-kollisjon
  let igjen = 0;
  bricks.forEach(b => {
    if(!b.aktiv) return;
    igjen++;
    if(ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
       ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h){
      b.aktiv = false;
      ball.dy *= -1;
      poeng += 10;
      document.getElementById("score").textContent = poeng;
      igjen--;
    }
  });

  // Alle borte → ny runde med økt fart
  if(igjen === 0){
    bricks.forEach(b => b.aktiv = true);
    poeng += 50;
    document.getElementById("score").textContent = poeng;
    ball.dx *= 1.12;
    ball.dy *= 1.12;
    ball.x = W/2; ball.y = H/2;
  }

  // Ball falt ut
  if(ball.y - ball.r > H){
    liv--;
    if(liv <= 0){ gameOver(); return; }
    ball.x = W/2; ball.y = H/2;
    const fart = Math.max(3, W * 0.007);
    ball.dx = fart * (Math.random() > .5 ? 1 : -1);
    ball.dy = -fart;
  }
}

async function gameOver(){
  kjorer = false;
  if(animId) cancelAnimationFrame(animId);

  // Lagre highscore
  try{
    const r = await fetch(JB_URL+"/latest", {headers:{"X-Master-Key":JB_KEY}});
    const data = (await r.json()).record || {};
    if(!data.breakout) data.breakout = {};
    const gammel = data.breakout[SPILLERNAVN] || 0;
    if(poeng > gammel){
      data.breakout[SPILLERNAVN] = poeng;
      await fetch(JB_URL, {method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":JB_KEY},body:JSON.stringify(data)});
    }
  }catch(e){}

  document.getElementById("overlay-title").textContent = poeng > 0 ? `${poeng} poeng 🎉` : "Game Over 😅";
  document.getElementById("overlay-sub").textContent = liv === 0 ? "Ingen liv igjen!" : "";
  document.getElementById("overlay").classList.remove("hidden");
  lastHighscore();
}

async function lastHighscore(){
  const liste = document.getElementById("hs-liste");
  try{
    const r = await fetch(JB_URL+"/latest", {headers:{"X-Master-Key":JB_KEY}});
    const data = (await r.json()).record || {};
    const scores = data.breakout || {};
    const sortert = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,8);
    const medaljer = ["🥇","🥈","🥉"];
    if(!sortert.length){ liste.innerHTML = '<div style="color:#222;text-align:center;padding:8px;font-size:13px">Ingen rekorder ennå</div>'; return; }
    liste.innerHTML = sortert.map(([navn,poeng],i)=>`
      <div class="hs-rad">
        <span class="hs-plass">${medaljer[i]||i+1+"."}</span>
        <span class="hs-navn">${navn}${navn===SPILLERNAVN?" (deg)":""}</span>
        <span class="hs-poeng">${poeng}</span>
      </div>`).join("");
  }catch(e){
    liste.innerHTML = '<div style="color:#222;text-align:center;padding:8px;font-size:13px">Kunne ikke hente rekorder</div>';
  }
}

// ── KONTROLLER ──
canvas.addEventListener("mousemove", e => {
  const rect = canvas.getBoundingClientRect();
  paddle.x = (e.clientX - rect.left) - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  paddle.x = (e.touches[0].clientX - rect.left) - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
}, {passive: false});

// Last highscore ved oppstart
lastHighscore();
</script>
</body>
</html>
